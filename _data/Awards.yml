    description: |
      Ranked 4th among 52 teams in the National Concrete Competition
      Associated with Imam Khomeini International University · May 2019
      We (Sepehr Nazari, Kimia Manifaar & I) took part as a team from Imam Khomeini in the 9th National Concrete Competition (NCC) which was held at AmirKabir University of Tehran (AUT) and placed 4th among 52 teams from different universities from the whole country.
    date: May 2019
