  - title: ERASMUS Programme
    description: |
      Issued by European Commission · Feb 2022
      Associated with Politecnico di Milano
      I was a selected winner for this very competitive grant. The scholarship would cover my tuition fees and would give me a stipend of 500 €/month for studying in Poland as an Erasmus Student, but I decided to turn down this offer because of the proximity of Poland to Ukraine and possibility of Poland being invaded by Russian army. (At the time, Russia had just started taking military actions against Ukraine)
    date: Feb 2022
